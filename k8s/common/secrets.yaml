# Secrets for MySQL and Redis
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: k8s-demo
type: Opaque
data:
  # base64 encoded: root123456
  mysql-root-password: cm9vdDEyMzQ1Ng==

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: k8s-demo
type: Opaque
data:
  # base64 encoded: redis123456
  redis-password: cmVkaXMxMjM0NTY=
